name: finquery
version: 0.1.0
description: >
  RL environment simulating a financial data terminal for training agents
  on multi-step analytical reasoning with dense per-step reward signals.
  Agents must navigate tool calls to answer verifiable financial questions.
author: Dhurandhar Team
tags:
  - openenv
  - finance
  - reasoning
  - enterprise
  - multi-step
tasks:
  - id: task1_easy
    name: Single-Metric Computation
    difficulty: easy
    description: "Compute Apple's net profit margin for FY2022"
    max_steps: 10
  - id: task2_medium
    name: Multi-Company Ratio Comparison
    difficulty: medium
    description: "Compare EV/EBITDA across MSFT, GOOGL, META vs sector median"
    max_steps: 20
  - id: task3_hard
    name: Multi-Year Anomaly Detection
    difficulty: hard
    description: "Detect FCF/PE anomalies across TSLA, F, GM over 2020-2024"
    max_steps: 40
action_schema: FinQueryAction
observation_schema: FinQueryObservation
state_schema: FinQueryState
reward_range: [0.0, 1.0]
reward_type: dense

inference:
  script: inference.py
  env:
    - API_BASE_URL
    - MODEL_NAME
    - HF_TOKEN
  timeout: 1200
  resources:
    vcpu: 2
    memory: 8gb

deployment:
  platform: huggingface
  sdk: docker
  port: 7860

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
  tasks: GET /tasks
  grader: POST /grader
  baseline: POST /baseline
  history: GET /history
  leaderboard: GET /leaderboard
  health: GET /health
  websocket: /ws
