name: finquery
version: 0.2.0
description: >
  RL environment simulating a financial data terminal for training agents
  on multi-step analytical reasoning. 25 companies across 7 sectors,
  9 years of data (2017-2025), with procedurally generated tasks.
  Supports configurable reset with seeds, batch generation, composite
  task mixing, and dense per-step reward signals.
author: Dhurandhar Team
tags:
  - openenv
  - finance
  - reasoning
  - enterprise
  - multi-step
  - procedural-generation
tasks:
  - id: task1_easy
    name: Single-Metric Computation
    difficulty: easy
    description: "Compute a randomly selected financial metric for a random company and year. 11 metrics x 25 tickers x 9 years = 2475+ unique tasks."
    max_steps: 10
  - id: task2_medium
    name: Multi-Company Ratio Comparison
    difficulty: medium
    description: "Compare a ratio across companies within a sector vs sector median. 7 sectors x company combos x 5 ratios x 9 years = hundreds of unique tasks."
    max_steps: 20
  - id: task3_hard
    name: Multi-Year Anomaly Detection
    difficulty: hard
    description: "Detect financial anomaly patterns across 3 companies over a multi-year window. 6 anomaly patterns x company combos x year windows = thousands of unique tasks."
    max_steps: 40
action_schema: FinQueryAction
observation_schema: FinQueryObservation
state_schema: FinQueryState
reward_range: [0.0, 1.0]
reward_type: dense

inference:
  script: inference.py
  env:
    - API_BASE_URL
    - MODEL_NAME
    - HF_TOKEN
    - SPACE_URL
  timeout: 1200
  resources:
    vcpu: 2
    memory: 8gb

deployment:
  platform: huggingface
  sdk: docker
  port: 7860

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
  tasks: GET /tasks
  grader: POST /grader
  baseline: POST /baseline
  history: GET /history
  leaderboard: GET /leaderboard
  health: GET /health
  websocket: /ws
